name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

# Required for actions/deploy-pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one in-flight deploy at a time; queued runs are cancelled in-progress=false so
# completing builds do not abort each other (D-04 — only push:main, no preview deploys).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

      - name: Build
        env:
          VITE_BASE: /lulu/
        run: npm run build

      - name: Post-build (SPA fallback + .nojekyll)
        run: node scripts/post-build.mjs

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
