name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

# Required for actions/deploy-pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one in-flight deploy at a time; queued runs are cancelled in-progress=false so
# completing builds do not abort each other (D-04 — only push:main, no preview deploys).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

      - name: Manifest check
        run: npm run manifest:check

      - name: Build
        env:
          VITE_BASE: /lulu/
        run: npm run build

      - name: Post-build (SPA fallback + .nojekyll)
        run: node scripts/post-build.mjs

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  test:
    # Phase 7 (A11Y-06, PERF-01..05, DEPLOY-03) — block deploy on the full e2e
    # suite: gate flow + axe-core a11y + heap-stability smoke. Runs in parallel
    # with `build`; the `deploy` job waits on both.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E (gate + a11y + smoke)
        env:
          VITE_BASE: /lulu/
        run: npx playwright test

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  deploy:
    needs: [build, test]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
